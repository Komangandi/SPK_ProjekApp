<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SPK Ternak Babi — Sistem Pendukung Keputusan untuk peternak babi skala kecil di Bali. Kalkulasi profit, rekomendasi panen, dan monitoring siklus ternak.">
  <meta name="theme-color" content="#0a0f1e">

  <!-- Open Graph -->
  <meta property="og:title" content="SPK Ternak Babi — Decision Support System">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

  <!-- App Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- App Mount Point -->
  <div id="app-root">

    <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0f1e;">

    </div>
  </div>

  <style>
    @keyframes spin {
      0%, 100% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(5deg) scale(1.05); }
    }
  </style>

  <!-- Data & Logic -->
  <script src="data.js"></script>
